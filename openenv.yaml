name: opengrid
description: >
  A real-world simulation of renewable energy grid load balancing with topology control.
  Agents must manage generator dispatch, battery storage, and transmission switching
  to maintain frequency stability and prevent blackouts under high renewable penetration.
version: 1.0.0
author: KRISHNA GOYAL
tags:
  - openenv
  - energy
  - optimization
  - control-systems
  - reinforcement-learning
endpoints:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  baseline: /baseline
  grader: /grader
  visualize: /visualize
models:
  observation: src.models.GridObservation
  action: src.models.GridAction
  reward: src.models.GridReward
tasks:
  - id: task_easy
    name: Easy Grid (5 buses, 20% renewables)
    description: Simple balancing task with low renewable penetration
    grader:
      endpoint: /grader
      score_range: [0, 1]
  - id: task_medium
    name: Medium Grid (10 buses, 50% renewables)
    description: Congestion management with moderate renewable mix
    grader:
      endpoint: /grader
      score_range: [0, 1]
  - id: task_hard
    name: Hard Grid (14 buses, 80% renewables)
    description: Volatile supply with high renewable penetration and tight margins
    grader:
      endpoint: /grader
      score_range: [0, 1]